services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        OPENMVS_REF: v2.4.0
    restart: unless-stopped
    env_file:
      - ./deploy/backend.env
    volumes:
      - backend_storage:/app/storage
    networks:
      - app_internal
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app_internal

networks:
  app_internal:
    driver: bridge

volumes:
  backend_storage:
  caddy_data:
  caddy_config: